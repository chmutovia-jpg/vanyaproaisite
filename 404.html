<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — страница не найдена</title>
  <style>
    :root { --ink:#101010; --muted:#68655e; --line:rgba(16,16,16,.12); }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 15% 15%, rgba(7,92,255,.10), transparent 28rem),
        radial-gradient(circle at 85% 10%, rgba(187,255,95,.36), transparent 22rem),
        #fff;
      color:var(--ink);
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    main {
      width:min(680px, calc(100vw - 32px));
      padding:36px;
      border:1px solid var(--line);
      border-radius:32px;
      background:rgba(255,255,255,.78);
      box-shadow:0 30px 90px rgba(16,16,16,.08);
      text-align:center;
    }
    h1 {
      margin:0 0 14px;
      font-size:clamp(54px, 12vw, 120px);
      line-height:.85;
      letter-spacing:-.09em;
    }
    p {
      margin:0 auto;
      max-width:480px;
      color:var(--muted);
      font-size:18px;
      line-height:1.45;
    }
    a {
      margin-top:24px;
      min-height:54px;
      padding:0 22px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:var(--ink);
      color:white;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Страница не найдена. Вернись на главную страницу сайта.</p>
    <a href="./">На главную</a>
  </main>
</body>
</html>
